name: GentooVM CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  static-validation:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML syntax validation
        run: |
          pip install pyyaml
          echo "Validating YAML files..."
          for f in calamares/settings.conf calamares/modules/*.conf; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "  PASS $f" || { echo "  FAIL $f"; exit 1; }
          done
          python3 -c "import yaml; yaml.safe_load(open('calamares/branding/gentoovm/branding.desc'))" && echo "  PASS branding.desc"

      - name: Shell script syntax
        run: |
          echo "Checking shell scripts..."
          find . -name "*.sh" -type f | while read f; do
            bash -n "$f" && echo "  PASS $f" || { echo "  FAIL $f"; exit 1; }
          done

      - name: Python syntax
        run: |
          python3 -m py_compile config/gentoovm-kernel-manager-gui && echo "PASS kernel-manager-gui"

      - name: Executable permissions
        run: |
          for f in scripts/*.sh qemu/*.sh run-*.sh; do
            [ -x "$f" ] && echo "  PASS $f" || { echo "  FAIL not executable $f"; exit 1; }
          done

      - name: No hardcoded secrets
        run: |
          echo "Scanning for secrets..."
          FOUND=0
          grep -rn "BEGIN.*PRIVATE KEY" . --include="*.sh" --include="*.conf" --include="*.py" --include="*.md" && FOUND=1 || true
          grep -rn "api[_-]key\|api[_-]token\|secret[_-]key" . --include="*.sh" --include="*.conf" --include="*.py" -i | grep -v README | grep -v ".md" && FOUND=1 || true
          [ "$FOUND" -eq 0 ] && echo "PASS no secrets found"

  config-validation:
    name: Installer Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calamares sequence integrity
        run: |
          pip install pyyaml
          python3 << 'PYEOF'
          import yaml
          with open("calamares/settings.conf") as f:
              cfg = yaml.safe_load(f)
          seq = cfg.get("sequence", [])
          show_modules = []
          exec_modules = []
          for phase in seq:
              if "show" in phase:
                  show_modules.extend(phase["show"])
              if "exec" in phase:
                  exec_modules.extend(phase["exec"])
          for m in ["welcome", "locale", "keyboard", "partition", "users", "summary", "finished"]:
              assert m in show_modules, f"Missing show module {m}"
              print(f"  PASS show/{m}")
          for m in ["partition", "mount", "unpackfs", "users", "shellprocess", "umount"]:
              assert m in exec_modules, f"Missing exec module {m}"
              print(f"  PASS exec/{m}")
          print("Calamares sequence OK")
          PYEOF

      - name: Installer defaults
        run: |
          grep -q "Chicago" calamares/modules/locale.conf && echo "PASS timezone"
          grep -q "wheel" calamares/modules/users.conf && echo "PASS admin group"
          grep -q "none" calamares/modules/locale.conf && echo "PASS geoip disabled"
          grep -q "erase" calamares/modules/partition.conf && echo "PASS whole-disk"
          grep -q "gpt" calamares/modules/partition.conf && echo "PASS gpt"
          grep -q "ext4" calamares/modules/partition.conf && echo "PASS ext4"
          grep -q "GRUB_TIMEOUT=30" config/grub-defaults && echo "PASS grub timeout"
          grep -q "GRUB_TIMEOUT_STYLE=menu" config/grub-defaults && echo "PASS grub menu"

      - name: No remote dependencies
        run: |
          for f in calamares/modules/*.conf; do
            if grep -qE "http://|https://" "$f" 2>/dev/null; then
              if ! grep -q 'internetCheckUrl' "$f"; then
                echo "FAIL remote reference in $f"; exit 1
              fi
            fi
          done
          echo "PASS no remote dependencies"

  postinstall-validation:
    name: Post-Install Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Script syntax
        run: |
          bash -n config/gentoovm-postinstall.sh && echo "PASS postinstall syntax"

      - name: BIOS and UEFI support
        run: |
          grep -q "/sys/firmware/efi" config/gentoovm-postinstall.sh && echo "PASS uefi detection"
          grep -q "i386-pc" config/gentoovm-postinstall.sh && echo "PASS bios support"
          grep -q "x86_64-efi" config/gentoovm-postinstall.sh && echo "PASS uefi support"
          grep -q "\-\-force" config/gentoovm-postinstall.sh && echo "PASS gpt bios force"

      - name: Post-install features
        run: |
          grep -q "wheel" config/gentoovm-postinstall.sh && echo "PASS sudo"
          grep -q "README" config/gentoovm-postinstall.sh && echo "PASS readme"
          grep -q "userdel" config/gentoovm-postinstall.sh && echo "PASS live user cleanup"
          grep -q "live.conf" config/gentoovm-postinstall.sh && echo "PASS autologin cleanup"
          grep -q "install-gentoovm" config/gentoovm-postinstall.sh && echo "PASS shortcut cleanup"
          grep -q "zram" config/gentoovm-postinstall.sh && echo "PASS zram"
          grep -q "swappiness" config/gentoovm-postinstall.sh && echo "PASS sysctl"
          grep -q "earlyoom" config/gentoovm-postinstall.sh && echo "PASS earlyoom"

  readme-validation:
    name: README Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Project README sections
        run: |
          for s in "Quick Start" "Using Gentoo" "Kernel Management" "VM Optimizations" "How It Was Built" "Troubleshooting" "bare metal"; do
            grep -qi "$s" README.md && echo "PASS section $s" || { echo "FAIL missing $s"; exit 1; }
          done

      - name: Desktop README completeness
        run: |
          for k in sudo zram Cinnamon Gentoo emerge terminal package troubleshooting kernel; do
            grep -qi "$k" config/README-desktop.md && echo "PASS desktop readme $k" || { echo "FAIL missing $k"; exit 1; }
          done

      - name: Bare metal warning
        run: |
          grep -q "bare metal" README.md && echo "PASS bare metal warning"
          grep -q "own risk" README.md && echo "PASS risk disclaimer"

      - name: Getting Started guide
        run: |
          [ -f GETTING-STARTED.md ] && echo "PASS getting started exists"
          grep -q "reassemble" GETTING-STARTED.md && echo "PASS reassembly docs"
          grep -q "PowerShell" GETTING-STARTED.md && echo "PASS windows docs"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Credential scan
        run: |
          FOUND=0
          grep -rn "BEGIN.*PRIVATE KEY" . --include="*.sh" --include="*.conf" --include="*.py" && FOUND=1 || true
          grep -rn "password\s*=\s*['\"]" . --include="*.sh" --include="*.py" | grep -v "README\|example\|template" && FOUND=1 || true
          [ "$FOUND" -eq 0 ] && echo "PASS no credentials found"

      - name: File permissions
        run: |
          find . -not -path './.git/*' -perm -002 -type f | head -5
          echo "PASS permission check"

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck > /dev/null 2>&1
          for f in scripts/*.sh config/gentoovm-postinstall.sh config/gentoovm-kernel-manager; do
            shellcheck -S warning "$f" 2>&1 | head -20 || true
          done
          echo "Shellcheck complete"

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        run: |
          python3 << 'PYEOF'
          import json
          sbom = {
            "bomFormat": "CycloneDX",
            "specVersion": "1.4",
            "version": 1,
            "metadata": {
              "component": {
                "type": "operating-system",
                "name": "GentooVM",
                "version": "1.0",
                "description": "Custom Gentoo Linux distribution for QEMU/KVM"
              }
            },
            "components": []
          }
          components = []
          with open("manifests/installed-packages.txt") as f:
              for line in f:
                  line = line.strip()
                  if "/" in line:
                      cat, namever = line.split("/", 1)
                      parts = namever.rsplit("-", 1)
                      if len(parts) == 2 and parts[1][0].isdigit():
                          name, version = parts
                      else:
                          name, version = namever, "unknown"
                      components.append({"type": "library", "group": cat, "name": name, "version": version})
          sbom["components"] = components
          with open("sbom.json", "w") as f:
              json.dump(sbom, f, indent=2)
          print(f"SBOM generated with {len(components)} components")
          PYEOF

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  checksum-verification:
    name: Checksum Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checksum files exist
        run: |
          [ -f iso/gentoovm.iso.sha256 ] && echo "PASS sha256 file"
          [ -f iso/gentoovm.iso.md5 ] && echo "PASS md5 file"
          [ -f iso/gentoovm-1.0.torrent ] && echo "PASS torrent file"

  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    needs: [static-validation, config-validation, postinstall-validation]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Config regression
        run: |
          python3 -c "import yaml; yaml.safe_load(open('calamares/settings.conf'))" && echo "PASS valid yaml"
          grep -q "Chicago" calamares/modules/locale.conf && echo "PASS timezone"
          grep -q "users" calamares/settings.conf && echo "PASS users"
          grep -q "partition" calamares/settings.conf && echo "PASS partition"
          grep -q "wheel" calamares/modules/users.conf && echo "PASS admin"
          grep -q "cinnamon" calamares/modules/displaymanager.conf && echo "PASS cinnamon"
          grep -q "lightdm" calamares/modules/displaymanager.conf && echo "PASS lightdm"

      - name: Post-install regression
        run: |
          grep -q "wheel" config/gentoovm-postinstall.sh && echo "PASS sudo"
          grep -q "README" config/gentoovm-postinstall.sh && echo "PASS readme"
          grep -q "zram" config/gentoovm-postinstall.sh && echo "PASS zram"
          grep -q "grub-install" config/gentoovm-postinstall.sh && echo "PASS bootloader"
          grep -q "live.conf" config/gentoovm-postinstall.sh && echo "PASS cleanup"

      - name: Repo completeness
        run: |
          MISSING=0
          for f in README.md GETTING-STARTED.md LICENSE calamares/settings.conf \
                   config/gentoovm-postinstall.sh config/gentoovm-kernel-manager \
                   config/gentoovm-kernel-manager-gui config/README-desktop.md \
                   config/make.conf config/grub-defaults scripts/build-iso.sh \
                   qemu/launch-live.sh qemu/launch-installed.sh \
                   manifests/installed-packages.txt docs/README.md \
                   iso/gentoovm.iso.sha256 iso/reassemble.sh iso/reassemble.ps1 \
                   .gitignore; do
            [ -e "$f" ] && echo "  PASS $f" || { echo "  FAIL $f"; MISSING=$((MISSING+1)); }
          done
          [ "$MISSING" -eq 0 ] || { echo "FAIL $MISSING files missing"; exit 1; }
