name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: YAML syntax validation
        run: |
          pip install pyyaml
          for f in calamares/settings.conf calamares/modules/*.conf; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "  PASS $f" || { echo "  FAIL $f"; exit 1; }
          done
          python3 -c "import yaml; yaml.safe_load(open('calamares/branding/gentoovm/branding.desc'))" && echo "  PASS branding.desc"

      - name: Shell script syntax
        run: |
          find . -name "*.sh" -type f | while read f; do
            bash -n "$f" && echo "  PASS $f" || { echo "  FAIL $f"; exit 1; }
          done

      - name: Python syntax
        run: python3 -m py_compile config/gentoovm-kernel-manager-gui && echo "PASS kernel-manager-gui"

      - name: Executable permissions
        run: |
          for f in scripts/*.sh qemu/*.sh run-*.sh; do
            [ -x "$f" ] && echo "  PASS $f" || { echo "  FAIL not executable $f"; exit 1; }
          done

      - name: No hardcoded secrets
        run: |
          FOUND=0
          grep -rn "BEGIN.*PRIVATE KEY" . --include="*.sh" --include="*.conf" --include="*.py" --include="*.md" && FOUND=1 || true
          grep -rn "api[_-]key\|api[_-]token\|secret[_-]key" . --include="*.sh" --include="*.conf" --include="*.py" -i | grep -v README | grep -v ".md" && FOUND=1 || true
          [ "$FOUND" -eq 0 ] && echo "PASS no secrets found"

      - name: Calamares sequence integrity
        run: |
          python3 << 'PYEOF'
          import yaml
          with open("calamares/settings.conf") as f:
              cfg = yaml.safe_load(f)
          seq = cfg.get("sequence", [])
          show_modules = []
          exec_modules = []
          for phase in seq:
              if "show" in phase:
                  show_modules.extend(phase["show"])
              if "exec" in phase:
                  exec_modules.extend(phase["exec"])
          for m in ["welcome", "locale", "keyboard", "partition", "users", "summary", "finished"]:
              assert m in show_modules, f"Missing show module {m}"
          for m in ["partition", "mount", "unpackfs", "users", "shellprocess", "umount"]:
              assert m in exec_modules, f"Missing exec module {m}"
          print("Calamares sequence OK")
          PYEOF

      - name: Security scan
        run: |
          FOUND=0
          grep -rn "BEGIN.*PRIVATE KEY" . --include="*.sh" --include="*.conf" --include="*.py" && FOUND=1 || true
          grep -rn "password\s*=\s*['\"]" . --include="*.sh" --include="*.py" | grep -v "README\|example\|template" && FOUND=1 || true
          [ "$FOUND" -eq 0 ] && echo "PASS no credentials found"

      - name: Checksum files exist
        run: |
          [ -f iso/gentoovm.iso.sha256 ] && echo "PASS sha256 file"
          [ -f iso/gentoovm.iso.md5 ] && echo "PASS md5 file"

      - name: Repo completeness
        run: |
          MISSING=0
          for f in README.md GETTING-STARTED.md LICENSE calamares/settings.conf \
                   config/gentoovm-postinstall.sh config/gentoovm-kernel-manager \
                   config/gentoovm-kernel-manager-gui config/README-desktop.md \
                   config/make.conf config/grub-defaults scripts/build-iso.sh \
                   qemu/launch-live.sh qemu/launch-installed.sh \
                   manifests/installed-packages.txt docs/README.md \
                   iso/gentoovm.iso.sha256 iso/reassemble.sh iso/reassemble.ps1 \
                   .gitignore; do
            [ -e "$f" ] && echo "  PASS $f" || { echo "  FAIL $f"; MISSING=$((MISSING+1)); }
          done
          [ "$MISSING" -eq 0 ] || { echo "FAIL $MISSING files missing"; exit 1; }

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        run: |
          python3 << 'PYEOF'
          import json
          sbom = {
            "bomFormat": "CycloneDX",
            "specVersion": "1.4",
            "version": 1,
            "metadata": {
              "component": {
                "type": "operating-system",
                "name": "GentooVM",
                "version": "${{ github.ref_name }}"
              }
            },
            "components": []
          }
          components = []
          with open("manifests/installed-packages.txt") as f:
              for line in f:
                  line = line.strip()
                  if "/" in line:
                      cat, namever = line.split("/", 1)
                      parts = namever.rsplit("-", 1)
                      if len(parts) == 2 and parts[1][0].isdigit():
                          name, version = parts
                      else:
                          name, version = namever, "unknown"
                      components.append({"type": "library", "group": cat, "name": name, "version": version})
          sbom["components"] = components
          with open("sbom.json", "w") as f:
              json.dump(sbom, f, indent=2)
          print(f"SBOM with {len(components)} components")
          PYEOF

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          cat > /tmp/relnotes.md << 'NOTES'
          ## GentooVM $TAG

          Custom Gentoo Linux for QEMU/KVM. See [README](https://github.com/jalsarraf0/gentoovm) and [Getting Started](https://github.com/jalsarraf0/gentoovm/blob/main/GETTING-STARTED.md).

          Download split ISO parts and run `reassemble.sh` (Linux/macOS) or `reassemble.ps1` (Windows). Or use the torrent/magnet link.
          NOTES
          sed -i "s/\$TAG/$TAG/g" /tmp/relnotes.md

          gh release create "$TAG" \
            --title "GentooVM ${TAG}" \
            --notes-file /tmp/relnotes.md \
            iso/gentoovm.iso.sha256 \
            iso/gentoovm.iso.md5 \
            iso/reassemble.sh \
            iso/reassemble.ps1 \
            sbom.json \
            2>/dev/null || true

  update-torrent-seed:
    name: Update Torrent Seed
    runs-on: self-hosted
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Update torrent seed on server
        run: |
          TAG="${{ github.ref_name }}"
          SEED_DIR="/docker/pirates/gentoo"
          COMPLETE_DIR="/docker/pirates/complete"
          ISO_SRC="/home/jalsarraf/git/gentoovm/iso/gentoovm.iso"
          TORRENT_SRC="/home/jalsarraf/git/gentoovm/iso/gentoovm-*.torrent"

          echo "=== Updating torrent seed for $TAG ==="

          # Stop and remove old torrent from transmission
          echo "Removing old torrents..."
          OLD_IDS=$(transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" -l 2>/dev/null | grep "gentoovm" | awk '{print $1}' | grep -v "ID\|Sum")
          for id in $OLD_IDS; do
            echo "  Removing torrent ID $id"
            transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" -t "$id" --remove 2>/dev/null || true
          done

          # Clean old files
          rm -f "$COMPLETE_DIR"/gentoovm.iso
          rm -f "$SEED_DIR"/gentoovm-*.torrent

          # Copy new ISO and torrent
          if [ -f "$ISO_SRC" ]; then
            echo "Copying new ISO to seed directory..."
            cp "$ISO_SRC" "$COMPLETE_DIR/gentoovm.iso"
            cp $TORRENT_SRC "$SEED_DIR/" 2>/dev/null || true

            # Find the new torrent file
            NEW_TORRENT=$(ls -t "$SEED_DIR"/gentoovm-*.torrent 2>/dev/null | head -1)
            if [ -n "$NEW_TORRENT" ]; then
              echo "Adding new torrent to transmission..."
              transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" \
                -a "$NEW_TORRENT" \
                --download-dir /data/completed 2>&1

              sleep 5

              # Start seeding
              NEW_ID=$(transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" -l 2>/dev/null | grep "gentoovm" | awk '{print $1}' | grep -v "ID\|Sum" | tail -1)
              if [ -n "$NEW_ID" ]; then
                transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" -t "$NEW_ID" -s 2>/dev/null
                echo "Seeding started for torrent ID $NEW_ID"
              fi

              # Wait for verification
              echo "Waiting for verification..."
              for i in $(seq 1 30); do
                sleep 5
                STATUS=$(transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" -l 2>/dev/null | grep "gentoovm")
                echo "  $STATUS"
                echo "$STATUS" | grep -q "100%" && break
              done
            fi

            echo "=== Torrent seed updated for $TAG ==="
          else
            echo "WARNING - ISO not found at $ISO_SRC"
            echo "Upload the ISO manually and run the seed update"
          fi

          # Show final status
          echo ""
          echo "=== Current torrents ==="
          transmission-remote -n "${{ secrets.TRANSMISSION_CREDS }}" -l 2>/dev/null
