---
defaultGroups:
    - name: users
      must_exist: true
    - name: wheel
      must_exist: true
    - name: audio
      must_exist: true
    - name: video
      must_exist: true
    - name: input
      must_exist: false
    - name: plugdev
      must_exist: false
    - name: cdrom
      must_exist: false
    - name: usb
      must_exist: false

autologinGroup: autologin

doAutologin: false

sudoersGroup: wheel
sudoersConfigureWithGroup: true

setRootPassword: true
doReusePassword: true

passwordRequirements:
    minLength: 1
    maxLength: -1

allowWeakPasswords: true
allowWeakPasswordsDefault: false

userShell: /bin/bash

setHostname: EtcFile
writeHostsFile: true
