# Gentoo VM ISO - make.conf
COMMON_FLAGS="-O2 -pipe -march=x86-64-v2"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
MAKEOPTS="-j10"
EMERGE_DEFAULT_OPTS="--jobs=4 --load-average=10 --getbinpkg --binpkg-respect-use=y"

# Binary packages
FEATURES="getbinpkg binpkg-request-signature parallel-fetch parallel-install candy"

# USE flags - lean desktop
USE="X wayland elogind dbus policykit udisks networkmanager pulseaudio
     alsa introspection gtk3 -bluetooth -cups -kde -qt5 -qt6
     -test -test -doc -handbook -nls -accessibility
     jpeg png svg tiff gif webp
     truetype fontconfig
     zstd lz4 lzma
     spice qemu virtio
     sudo pam
     -emacs -xemacs"

# Locale
L10N="en"
LINGUAS="en"

# Video
VIDEO_CARDS="virtio virgl lavapipe fbdev vesa qxl"
INPUT_DEVICES="libinput"

# Accept all licenses and keywords
ACCEPT_LICENSE="*"
ACCEPT_KEYWORDS="amd64"

# Portage directories
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# Grub platforms
GRUB_PLATFORMS="efi-64 pc"

